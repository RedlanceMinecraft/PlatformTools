name: Publish

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish
        run: ./gradlew build publish
        env:
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
